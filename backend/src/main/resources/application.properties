spring.application.name=backend

# Base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/SpaMascotasBD
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — clave secreta (mínimo 32 caracteres para que funcione)
jwt.secreto=clave-secreta-spa-mascotas-proyecto-universitario-2024-ok
jwt.expiracion.ms=86400000